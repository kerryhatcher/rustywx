<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="rustywx cyclone mark">
  <defs>
    <linearGradient id="arm" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="55%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1E3A5F"/>
    </linearGradient>
    <radialGradient id="eye" cx="45%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFB067"/>
      <stop offset="60%" stop-color="#FF8C3A"/>
      <stop offset="100%" stop-color="#F26A1B"/>
    </radialGradient>
  </defs>

  <!-- Two tapered spiral bands, 180° rotationally symmetric -->
  <g fill="url(#arm)">
    <path d="M262 96
      C356 104 430 178 424 276
      C420 340 380 384 330 392
      C368 350 372 292 340 258
      C388 268 402 214 372 172
      C338 124 292 108 262 96 Z"/>
    <path transform="rotate(180 256 256)" d="M262 96
      C356 104 430 178 424 276
      C420 340 380 384 330 392
      C368 350 372 292 340 258
      C388 268 402 214 372 172
      C338 124 292 108 262 96 Z"/>
  </g>

  <!-- Eye -->
  <circle cx="256" cy="256" r="34" fill="url(#eye)"/>
  <circle cx="256" cy="256" r="34" fill="none" stroke="#0F172A" stroke-width="5"/>
</svg>
