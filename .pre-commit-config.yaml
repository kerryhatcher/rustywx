# Pre-commit hooks for rustywx
# Install: pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # ── General file checks ──────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple]
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  # ── Secrets detection ────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  # ── Rust: formatting ─────────────────────────────────────────
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all -- --check
        language: system
        types: [rust]
        pass_filenames: false

  # ── Rust: clippy lints ───────────────────────────────────────
  - repo: local
    hooks:
      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --all-targets --all-features -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

  # ── Rust: compilation check ──────────────────────────────────
  - repo: local
    hooks:
      - id: cargo-check
        name: cargo check
        entry: cargo check --all-targets --all-features
        language: system
        types: [rust]
        pass_filenames: false

  # ── Rust: tests ──────────────────────────────────────────────
  - repo: local
    hooks:
      - id: cargo-test
        name: cargo test
        entry: cargo test --all-features
        language: system
        types: [rust]
        pass_filenames: false
        stages: [pre-push]  # tests are slow; run on push only

  # ── Rust: dependency audit ───────────────────────────────────
  - repo: local
    hooks:
      - id: cargo-audit
        name: cargo audit
        entry: cargo-audit audit --ignore RUSTSEC-2026-0192
        language: system
        types: [rust]
        pass_filenames: false

  # ── Rust: license + advisory check ───────────────────────────
  - repo: local
    hooks:
      - id: cargo-deny
        name: cargo deny check
        entry: cargo-deny check
        language: system
        types: [rust]
        pass_filenames: false

  # ── Rust: documentation tests ────────────────────────────────
  - repo: local
    hooks:
      - id: cargo-test-doc
        name: cargo test --doc
        entry: cargo test --doc
        language: system
        types: [rust]
        pass_filenames: false
        stages: [pre-push]

  # ── Shell script linting ─────────────────────────────────────
  - repo: local
    hooks:
      - id: shellcheck
        name: shellcheck
        entry: bash -c 'command -v shellcheck >/dev/null && shellcheck "$@" || exit 0' --
        language: system
        types: [shell]
        exclude: '.*\.py$'

  # ── Spell checking ───────────────────────────────────────────
  - repo: https://github.com/crate-ci/typos
    rev: v1.48.0
    hooks:
      - id: typos
        args: [--config, typos.toml]

  # ── Markdown link checking ───────────────────────────────────
  - repo: local
    hooks:
      - id: lychee
        name: lychee
        entry: lychee --no-progress --exclude 'localhost|127\.0\.0\.1|crates\.io' .
        language: system
        pass_filenames: false
        stages: [pre-push]

  # ── Trivy filesystem scan ────────────────────────────────────
  - repo: local
    hooks:
      - id: trivy-fs
        name: trivy fs scan
        entry: trivy filesystem --scanners vuln,secret,misconfig --severity HIGH,CRITICAL --exit-code 1 --no-progress .
        language: system
        pass_filenames: false
        stages: [pre-push]

  # ── Kingfisher secrets scan ───────────────────────────────────
  - repo: local
    hooks:
      - id: kingfisher
        name: kingfisher scan
        entry: kingfisher scan --exclude target --exclude .git --exclude Cargo.lock .
        language: system
        pass_filenames: false
        stages: [pre-push]
