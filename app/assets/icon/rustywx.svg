<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="rustywx app icon — cyclone">
  <defs>
    <linearGradient id="badge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#12233F"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="arm" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="55%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1E3A5F"/>
    </linearGradient>
    <radialGradient id="eye" cx="45%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFB067"/>
      <stop offset="60%" stop-color="#FF8C3A"/>
      <stop offset="100%" stop-color="#F26A1B"/>
    </radialGradient>
  </defs>

  <!-- App badge -->
  <rect x="64" y="64" width="896" height="896" rx="200" fill="url(#badge)"/>
  <rect x="64" y="64" width="896" height="896" rx="200" fill="none" stroke="#2563EB" stroke-opacity="0.35" stroke-width="4"/>

  <!-- Faint range rings for radar identity -->
  <g fill="none" stroke="#2563EB" stroke-opacity="0.12" stroke-width="5">
    <circle cx="512" cy="512" r="300"/>
    <circle cx="512" cy="512" r="390"/>
  </g>

  <!-- Cyclone mark, centered and scaled to fill the badge -->
  <g transform="translate(102.4 102.4) scale(1.6)">
    <g fill="url(#arm)">
      <path d="M262 96 C356 104 430 178 424 276 C420 340 380 384 330 392 C368 350 372 292 340 258 C388 268 402 214 372 172 C338 124 292 108 262 96 Z"/>
      <path transform="rotate(180 256 256)" d="M262 96 C356 104 430 178 424 276 C420 340 380 384 330 392 C368 350 372 292 340 258 C388 268 402 214 372 172 C338 124 292 108 262 96 Z"/>
    </g>
    <circle cx="256" cy="256" r="34" fill="url(#eye)"/>
    <circle cx="256" cy="256" r="34" fill="none" stroke="#0F172A" stroke-width="5"/>
  </g>
</svg>
